# Alembic configuration file.
# Read by the `alembic` CLI and by alembic/env.py.

[alembic]
# Path to the migrations directory. %(here)s resolves to the directory
# containing this ini file, which makes the path robust to the cwd we invoke
# alembic from (needed inside the backend container where cwd = /app).
script_location = %(here)s/alembic

# Template used to generate new revision filenames
file_template = %%(rev)s_%%(slug)s

# Timezone for "create date" in new revision headers
timezone = UTC

# sys.path entries — add the src/backend directory so `app` is importable
prepend_sys_path = .

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
