# Pre-commit hooks for economic-warfare-osint (parent repo).
#
# Setup: install dev extras, then install the git hook:
#   uv sync --extra dev
#   uv run pre-commit install
#
# To bypass in a genuine emergency:
#   git commit --no-verify
#
# Ruff config lives in pyproject.toml under [tool.ruff].
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]

  # Local hooks
  - repo: local
    hooks:
      # Scrub .env values from any cassette being committed. Runs only when
      # files under tests/cassettes/ are staged. Exits non-zero if it
      # rewrites any file — re-stage and commit again.
      - id: redact-cassettes
        name: redact secrets from VCR cassettes
        entry: python scripts/redact-cassettes.py
        language: system
        files: ^tests/cassettes/.*\.yaml$
        pass_filenames: false

      # Fast pre-push gate: run pytest -x so a failing test blocks the push
      # before it ever reaches GitHub Actions. Local backstop only — CI is
      # the merge-blocking authority.
      - id: pytest-pre-push
        name: pytest (pre-push)
        entry: pytest -x --no-header
        language: system
        stages: [pre-push]
        pass_filenames: false
        types: [python]
