services:
  - type: web
    name: emissary
    runtime: python
    region: oregon
    plan: free
    branch: emissary-v1
    buildCommand: ./build.sh
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: NODE_VERSION
        value: "20.11.0"
      - key: EMISSARY_MOCK_DATA
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false  # set manually in Render dashboard
      - key: FRED_API_KEY
        sync: false  # set manually in Render dashboard
